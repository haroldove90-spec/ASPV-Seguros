<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ASPV Seguros - Asistencia Vial</title>
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#003366" />
    <meta name="description" content="Asistencia y Protección Vial de ASPV Seguros" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ASPV Seguros" />
    <link rel="apple-touch-icon" href="https://cossma.com.mx/aspv.png" />
    
    <!-- Real Manifest Link -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('ASPV: Service Worker registrado', reg))
            .catch(err => console.error('ASPV: Error al registrar SW', err));
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
